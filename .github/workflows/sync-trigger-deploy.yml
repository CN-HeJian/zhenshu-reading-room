name: Deploy WeRead sync trigger

on:
  push:
    branches: [main]
    paths:
      - "sync-worker/**"
      - ".github/workflows/sync-trigger-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config sync-worker/wrangler.toml

      - name: Configure Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_ACTIONS_TOKEN: ${{ secrets.GITHUB_ACTIONS_TOKEN }}
          SYNC_TRIGGER_KEY: ${{ secrets.SYNC_TRIGGER_KEY }}
        run: |
          test -n "$GITHUB_ACTIONS_TOKEN"
          test -n "$SYNC_TRIGGER_KEY"
          printf '%s' "$GITHUB_ACTIONS_TOKEN" | npx wrangler secret put GITHUB_ACTIONS_TOKEN --config sync-worker/wrangler.toml
          printf '%s' "$SYNC_TRIGGER_KEY" | npx wrangler secret put SYNC_TRIGGER_KEY --config sync-worker/wrangler.toml
