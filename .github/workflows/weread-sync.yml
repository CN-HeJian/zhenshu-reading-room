# Sync the latest complete WeRead dataset and publish the static reading room.
name: WeRead GitHub Pages sync

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/weread-sync.yml"
      - "lib/weread/**"
      - "scripts/export-weread-data.mjs"
      - "scripts/analyze-reading-journey.mjs"
      - ".github/reading-journey-baseline.trigger"
      - "tests/**"
      - "github-pages/**"
  schedule:
    - cron: "30 15 * * *"
    - cron: "15 16 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: weread-github-pages-sync
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify WeRead adapter
        run: >-
          node --experimental-strip-types --test
          tests/weread-core.test.mjs
          tests/weread-client.test.mjs
          tests/export-weread-data.test.mjs
          tests/github-pages-static.test.mjs
          tests/github-pages-view-model.test.mjs
          tests/reading-journey.test.mjs

      - name: Export latest WeRead data
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        run: node scripts/export-weread-data.mjs

      - name: Generate lifelong reading journey
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '15 16 * * 0' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[run-reading-journey]'))
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-pro
        run: node scripts/analyze-reading-journey.mjs

      - name: Persist reading journey archive
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '15 16 * * 0' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[run-reading-journey]'))
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add analysis-history github-pages/data/reading-journey.json github-pages/data/reading-journey-history.json
          if git diff --cached --quiet; then
            echo "没有新的阅读心路归档需要保存。"
            exit 0
          fi
          git commit -m "chore: update lifelong reading journey [skip ci]"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
