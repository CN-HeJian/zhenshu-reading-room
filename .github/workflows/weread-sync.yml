# Sync the latest complete WeRead dataset and publish the static reading room.
name: WeRead GitHub Pages sync

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/weread-sync.yml"
      - "lib/weread/**"
      - "scripts/export-weread-data.mjs"
      - "tests/**"
      - "github-pages/**"
  schedule:
    - cron: "30 15 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: weread-github-pages-sync
  cancel-in-progress: false

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify WeRead adapter
        run: >-
          node --experimental-strip-types --test
          tests/weread-core.test.mjs
          tests/weread-client.test.mjs
          tests/export-weread-data.test.mjs
          tests/github-pages-static.test.mjs

      - name: Export latest WeRead data
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        run: node scripts/export-weread-data.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
